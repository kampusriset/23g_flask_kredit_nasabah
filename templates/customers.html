{% extends 'base.html' %}
{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Daftar Nasabah</h3>
    <a class="btn btn-success" href="{{ url_for('add_customer') }}">+ Tambah Nasabah</a>
  </div>
  <table class="table table-striped">
    <thead><tr><th>Nama</th><th>Telepon</th><th>Alamat</th><th>Aksi</th></tr></thead>
    <tbody>
      {% for c in customers %}
        <tr>
          <td>{{ c.nama }}</td>
          <td>{{ c.telepon or '-' }}</td>
          <td>{{ c.alamat or '-' }}</td>
          <td>
            <a href="{{ url_for('edit_customer', id=c.id) }}" class="btn btn-sm btn-primary">Edit</a>
            <form action="{{ url_for('delete_customer', id=c.id) }}" method="post" style="display:inline" onsubmit="return confirm('Yakin hapus?')">
              <button class="btn btn-sm btn-danger">Hapus</button>
            </form>
          </td>
        </tr>
      {% else %}
        <tr><td colspan="4">Belum ada nasabah.</td></tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
